<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internet Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'MS Sans Serif', Tahoma, Verdana, sans-serif;
      font-size: 12px;
      background: #c0c0c0;
      color: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Title bar (draggable) */
    .ie-titlebar {
      -webkit-app-region: drag;
      background: linear-gradient(to right, #0a246a, #3a6ea5);
      padding: 2px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      flex-shrink: 0;
    }
    .ie-titlebar-text {
      color: #fff; font-size: 12px; font-weight: bold;
      display: flex; align-items: center; gap: 4px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .ie-titlebar-text img { width: 16px; height: 16px; image-rendering: pixelated; }
    .ie-btns {
      display: flex; gap: 2px; -webkit-app-region: no-drag;
    }
    .ie-btn {
      width: 18px; height: 18px; background: #c0c0c0;
      border: 2px solid; border-color: #dfdfdf #000 #000 #dfdfdf;
      box-shadow: inset 1px 1px 0px #fff, inset -1px -1px 0px #808080;
      font-size: 10px; cursor: default;
      display: flex; align-items: center; justify-content: center; color: #000;
    }
    .ie-btn:active {
      border-color: #000 #dfdfdf #dfdfdf #000;
      box-shadow: inset -1px -1px 0px #fff, inset 1px 1px 0px #808080;
    }

    /* Menu bar */
    .ie-menubar {
      background: #c0c0c0; display: flex; height: 22px;
      align-items: stretch; border-bottom: 1px solid #808080; flex-shrink: 0;
    }
    .ie-menu-item {
      padding: 2px 8px; cursor: default; display: flex; align-items: center;
    }
    .ie-menu-item:hover { background: #000080; color: #fff; }

    /* Toolbar */
    .ie-toolbar {
      background: #c0c0c0; padding: 2px 4px;
      display: flex; align-items: center; gap: 4px;
      border-bottom: 1px solid #808080; flex-shrink: 0;
    }
    .ie-tb {
      height: 22px; background: #c0c0c0; border: 1px solid #c0c0c0;
      display: flex; align-items: center; gap: 3px;
      cursor: default; padding: 0 6px; font-size: 11px;
    }
    .ie-tb:hover { border: 1px solid; border-color: #fff #808080 #808080 #fff; }
    .ie-tb:active { border-color: #808080 #fff #fff #808080; }
    .ie-tb img { width: 16px; height: 16px; image-rendering: pixelated; }
    .ie-sep { width: 2px; height: 22px; margin: 0 2px; border-left: 1px solid #808080; border-right: 1px solid #fff; }

    /* Address bar */
    .ie-addressbar {
      background: #c0c0c0; padding: 2px 6px;
      display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid #808080; flex-shrink: 0;
    }
    .ie-addressbar-label { font-size: 11px; font-weight: bold; white-space: nowrap; }
    .ie-addressbar-input {
      flex: 1; height: 22px; background: #fff;
      border: 2px solid; border-color: #808080 #dfdfdf #dfdfdf #808080;
      box-shadow: inset 1px 1px 0px #000;
      padding: 0 6px; font-family: inherit; font-size: 12px;
      display: flex; align-items: center;
    }
    .ie-go-btn {
      height: 22px; padding: 0 10px; background: #c0c0c0;
      border: 2px solid; border-color: #dfdfdf #000 #000 #dfdfdf;
      box-shadow: inset 1px 1px 0px #fff, inset -1px -1px 0px #808080;
      font-family: inherit; font-size: 11px; cursor: pointer;
    }
    .ie-go-btn:active {
      border-color: #000 #dfdfdf #dfdfdf #000;
      box-shadow: inset -1px -1px 0px #fff, inset 1px 1px 0px #808080;
    }

    /* Webview container */
    .ie-content {
      flex: 1; overflow: hidden; background: #fff;
      border: 2px solid; border-color: #808080 #dfdfdf #dfdfdf #808080;
      margin: 2px;
    }
    .ie-content webview {
      width: 100%; height: 100%; border: none; display: flex;
    }

    /* Status bar */
    .ie-statusbar {
      background: #c0c0c0; padding: 2px 4px; display: flex; gap: 4px;
      border-top: 1px solid #fff; flex-shrink: 0;
    }
    .ie-status-sec {
      border: 2px solid; border-color: #808080 #dfdfdf #dfdfdf #808080;
      padding: 1px 6px; font-size: 11px; flex: 1;
    }

    /* Loading */
    .ie-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100%; font-size: 12px; color: #808080;
    }
  </style>
</head>
<body>

  <!-- Title bar -->
  <div class="ie-titlebar">
    <div class="ie-titlebar-text">
      <img src="icons/internet_connection_wiz-5.png" alt="">
      <span id="ie-title">Microsoft Internet Explorer</span>
    </div>
    <div class="ie-btns">
      <div class="ie-btn" onclick="window.electronAPI.minimize()">_</div>
      <div class="ie-btn" onclick="window.electronAPI.maximize()">&#9633;</div>
      <div class="ie-btn" style="font-weight:bold" onclick="window.electronAPI.close()">&times;</div>
    </div>
  </div>

  <!-- Menu bar -->
  <div class="ie-menubar">
    <div class="ie-menu-item"><u>F</u>ile</div>
    <div class="ie-menu-item"><u>E</u>dit</div>
    <div class="ie-menu-item"><u>V</u>iew</div>
    <div class="ie-menu-item"><u>G</u>o</div>
    <div class="ie-menu-item">F<u>a</u>vorites</div>
    <div class="ie-menu-item"><u>H</u>elp</div>
  </div>

  <!-- Toolbar -->
  <div class="ie-toolbar">
    <div class="ie-tb" onclick="goBack()"><img src="icons/back-0.png" alt="" onerror="this.outerHTML='&#9664;'"> Back</div>
    <div class="ie-tb" onclick="goForward()"><img src="icons/forward-0.png" alt="" onerror="this.outerHTML='&#9654;'"> Forward</div>
    <div class="ie-sep"></div>
    <div class="ie-tb" onclick="doRefresh()">Refresh</div>
    <div class="ie-tb" onclick="goHome()"><img src="icons/computer-3.png" alt=""> Home</div>
  </div>

  <!-- Address bar -->
  <div class="ie-addressbar">
    <span class="ie-addressbar-label">Address</span>
    <input class="ie-addressbar-input" id="url-input" type="text" value="">
    <button class="ie-go-btn" onclick="navigate()">Go</button>
  </div>

  <!-- Content -->
  <div class="ie-content">
    <webview id="browser-frame" allowpopups></webview>
  </div>

  <!-- Status bar -->
  <div class="ie-statusbar">
    <span class="ie-status-sec" id="ie-status">Done</span>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var targetUrl = params.get('url') || 'https://timur.cool';
    var targetTitle = params.get('title') || 'Internet Explorer';

    var urlInput = document.getElementById('url-input');
    var frame = document.getElementById('browser-frame');
    var statusEl = document.getElementById('ie-status');
    var titleEl = document.getElementById('ie-title');

    titleEl.textContent = targetTitle + ' - Microsoft Internet Explorer';
    urlInput.value = targetUrl;

    function navigate(url) {
      url = url || urlInput.value.trim();
      if (!url) return;
      if (!url.match(/^https?:\/\//)) url = 'https://' + url;
      urlInput.value = url;
      statusEl.textContent = 'Opening page...';
      frame.src = url;
    }

    frame.addEventListener('did-start-loading', function() {
      statusEl.textContent = 'Loading...';
    });

    frame.addEventListener('did-finish-load', function() {
      statusEl.textContent = 'Done';
      var t = frame.getTitle();
      if (t) titleEl.textContent = t + ' - Microsoft Internet Explorer';
      urlInput.value = frame.getURL();
    });

    frame.addEventListener('did-fail-load', function(e) {
      if (e.errorCode !== -3) statusEl.textContent = 'Error: ' + e.errorDescription;
    });

    frame.addEventListener('page-title-updated', function(e) {
      titleEl.textContent = e.title + ' - Microsoft Internet Explorer';
    });

    frame.addEventListener('did-navigate', function(e) {
      urlInput.value = e.url;
    });

    urlInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') navigate();
    });

    function goBack() { if (frame.canGoBack()) frame.goBack(); }
    function goForward() { if (frame.canGoForward()) frame.goForward(); }
    function doRefresh() { frame.reload(); }
    function goHome() { navigate('https://timur.cool'); }

    // Load initial URL
    navigate(targetUrl);
  </script>
</body>
</html>
